# policy, and support documentation.

name: devcontainer nightly

on: 
  workflow_dispatch:

# Declare default permissions as read only.
permissions: read-all

jobs:
  build:
    name: Build devcontainer
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      OCI_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name || 'github-actions-tests' }}
    steps:
      - name: Fix Docker Sock
        shell: bash -l {0}
        run: sudo chmod 777 /var/run/docker.sock

      - name: "Checkout"
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          token: ${{ github.token }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # FIXED: added flavor setting to force lowercase string output
          flavor: |
            latest=auto
          images: |
            ${{ env.OCI_IMAGE }}
          # generate Docker tags based on the following events/attributes
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=sha,prefix=,format=long

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN || github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-flags: ${{ vars.DOCKER_BUILDX_DEBUG || '' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Docker Image Manifest Check
        id: docker-image-manifest-check
        shell: bash -l {0}
        run: docker manifest inspect ${{ env.OCI_IMAGE }}:${{ github.event.pull_request.head.sha || github.sha }}